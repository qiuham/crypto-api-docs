name: Crawl Docs

"on":
  workflow_dispatch:
    inputs:
      exchange:
        description: Exchange to crawl
        required: true
        type: choice
        options:
          - hyperliquid
          - coinbase
          - kraken
          - gateio
          - binance
          - bybit
          - okx
      concurrency:
        description: Crawler concurrency
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"
      limit:
        description: Optional page limit for test runs, for example 3
        required: false
        default: ""
        type: string
      lang:
        description: Optional language filter, for example en or en,zh
        required: false
        default: ""
        type: string
      commit_changes:
        description: Commit and push docs changes
        required: true
        default: true
        type: boolean
  schedule:
    # Daily full refresh: 02:00 Asia/Shanghai (18:00 UTC).
    - cron: "0 18 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: crawl-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    name: Crawl ${{ inputs.exchange }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      - name: Crawl docs
        env:
          EXCHANGE: ${{ inputs.exchange }}
          CRAWL_CONCURRENCY: ${{ inputs.concurrency }}
          LIMIT: ${{ inputs.limit }}
          LANG_FILTER: ${{ inputs.lang }}
        run: |
          set -euo pipefail

          if [[ ! "$CRAWL_CONCURRENCY" =~ ^[0-9]+$ ]]; then
            echo "Invalid concurrency: $CRAWL_CONCURRENCY" >&2
            exit 2
          fi

          args=(src/main.py crawl -e "$EXCHANGE" -c "$CRAWL_CONCURRENCY")

          if [[ -n "$LIMIT" ]]; then
            if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
              echo "Invalid limit: $LIMIT" >&2
              exit 2
            fi
            args+=(-l "$LIMIT")
          fi

          if [[ -n "$LANG_FILTER" ]]; then
            if [[ ! "$LANG_FILTER" =~ ^[A-Za-z0-9_,.-]+$ ]]; then
              echo "Invalid lang filter: $LANG_FILTER" >&2
              exit 2
            fi
            args+=(--lang "$LANG_FILTER")
          fi

          echo "PYTHONPATH=. python ${args[*]}"
          PYTHONPATH=. python "${args[@]}" 2>&1 | tee crawl.log

      - name: Upload crawl log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-log-${{ inputs.exchange }}-${{ github.run_id }}
          path: crawl.log
          if-no-files-found: ignore

      - name: Commit updated docs
        if: ${{ inputs.commit_changes }}
        env:
          EXCHANGE: ${{ inputs.exchange }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs index README.md
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "Update ${EXCHANGE} API docs"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi

  scheduled-crawl:
    name: Scheduled crawl ${{ matrix.exchange }}
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - exchange: coinbase
            concurrency: "5"
          - exchange: hyperliquid
            concurrency: "2"
          - exchange: binance
            concurrency: "3"
          - exchange: bybit
            concurrency: "3"
          - exchange: okx
            concurrency: "3"
          - exchange: kraken
            concurrency: "1"
          - exchange: gateio
            concurrency: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest branch
        run: git pull --ff-only origin "${GITHUB_REF_NAME:-main}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install

      - name: Crawl docs
        env:
          EXCHANGE: ${{ matrix.exchange }}
          CRAWL_CONCURRENCY: ${{ matrix.concurrency }}
        run: |
          set -euo pipefail
          args=(src/main.py crawl -e "$EXCHANGE" -c "$CRAWL_CONCURRENCY")
          echo "PYTHONPATH=. python ${args[*]}"
          PYTHONPATH=. python "${args[@]}" 2>&1 | tee crawl.log

      - name: Upload crawl log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-crawl-log-${{ matrix.exchange }}-${{ github.run_id }}
          path: crawl.log
          if-no-files-found: ignore

      - name: Commit updated docs
        env:
          EXCHANGE: ${{ matrix.exchange }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs index README.md
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
          else
            git commit -m "Update ${EXCHANGE} API docs"
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          fi
